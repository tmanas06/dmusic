services:
  api:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/app/data
      - PYTHONPATH=/app
      - MAX_DOWNLOAD_QUALITY=320
      - CORS_ORIGINS=*
    restart: unless-stopped

  worker:
    build: ./backend
    command: celery -A worker.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - ./backend:/app
      - ./data:/app/data
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/app/data
      - PYTHONPATH=/app
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # Removed host port mapping "6379:6379" to avoid conflict with host process
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
